<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISCOV - Discador WhatsApp Top</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="app">

        <!-- TELA INICIAL -->

        <section id="setup" class="card">

            <h1>DISCOV</h1>
            <p>Discador WhatsApp Top</p>

            <label>Cidade</label>

            <select id="cidade">
                <option>Caxias do Sul</option>
                <option>Farroupilha</option>
                <option>Bento Gonçalves</option>
                <option>Encantado</option>
                <option>Soledade</option>
                <option>Veranópolis</option>
                <option>Flores da Cunha</option>
            </select>

            <label>Campanha</label>

            <select id="campanha">
                <option>Implantes</option>
                <option>Ortodontia</option>
                <option>Avaliação</option>
                <option>Profilaxia</option>
                <option>Revisão</option>
                <option>Reativação</option>
                <option>Pós-venda</option>
                <option>Personalizada</option>
            </select>

            <label>Responsável</label>

            <input
                type="text"
                id="responsavel"
                placeholder="Nome da recepcionista">

            <label>Lista de contatos</label>

            <textarea
                id="lista"
                placeholder="Cole neste formato:

Maria Silva;54999999999
João Pereira;54988888888
Ana Costa;54977777777"></textarea>

            <button onclick="iniciarCampanha()">
                Iniciar Lista
            </button>

            <button
                class="secondary"
                onclick="continuarCampanha()">

                Continuar Campanha

            </button>

        </section>

        <!-- DISCADOR -->

        <section
            id="discador"
            class="card hidden">

            <h2 id="nomeContato"></h2>

            <p id="telefoneContato"></p>

            <p id="infoCampanha"></p>

            <p id="progresso"></p>

            <a
                id="abrirWhatsapp"
                class="whatsapp"
                target="_blank">

                Abrir WhatsApp

            </a>

            <label>Resultado</label>

            <select id="resultado">

                <option value="">Selecione</option>

                <option>Agendou</option>

                <option>Interessado</option>

                <option>Não respondeu</option>

                <option>Não atende</option>

                <option>Número inválido</option>

                <option>Sem interesse</option>

                <option>Já é paciente</option>

                <option>Reagendar</option>

            </select>

            <label>Observações</label>

            <textarea
                id="observacao"
                placeholder="Digite alguma observação..."></textarea>

            <button onclick="salvarEProximo()">

                Salvar e Próximo

            </button>

            <button
                class="secondary"
                onclick="verRelatorio()">

                Ver Relatório

            </button>

        </section>

        <!-- RELATÓRIO -->

        <section
            id="relatorio"
            class="card hidden">

            <h2>Relatório Final</h2>

            <div id="resumo"></div>

            <button onclick="baixarCSV()">

                Baixar CSV

            </button>

            <button
                class="secondary"
                onclick="novaCampanha()">

                Nova Campanha

            </button>

        </section>

    </main>

    <script src="js/script.js"></script>

</body>

</html>
